<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Razorpay Payment Test</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background-color: #f5f5f5;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 300px;
        }
        button {
            background-color: #3399cc;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Payment Test (API Gateway → Payment → Razorpay)</h2>

<label>Order ID:</label><br> <input type="text" id="orderId" placeholder="Enter Order UUID"><br><br>

<label>JWT Token:</label><br> <input type="text" id="token" placeholder="Paste JWT Token Here"><br><br>

<button onclick="createPayment()">Create Payment</button>

<script>
async function createPayment() {

    const orderId = document.getElementById("orderId").value;
    const token = document.getElementById("token").value;

    if (!orderId || !token) {
        alert("Please enter Order ID and JWT Token");
        return;
    }

    try {
        const response = await fetch(
            `http://localhost:8080/api/payments/${orderId}`,
            {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        if (!response.ok) {
            const errorText = await response.text();
            console.error("Error:", errorText);
            alert("Payment creation failed: " + errorText);
            return;
        }

        const data = await response.json();
        console.log("Payment Created:", data);

        openRazorpay(data);

    } catch (error) {
        console.error("Request failed:", error);
        alert("Something went wrong!");
    }
}

function openRazorpay(payment) {

    const options = {
        key: "rzp_test_SD9ylWDLI50Zgv",
        amount: payment.amount * 100,
        currency: "INR",
        name: "ShopSphere",
        description: "Order Payment",
        order_id: payment.gatewayOrderId,

        handler: function (response) {
            console.log("Payment Success:", response);
            alert("Payment Successful! Webhook will update backend.");
        },

        prefill: {
            name: "Test User",
            email: "shubhammungase777@gmail.com",
            contact: "9999999999"
        },

        theme: {
            color: "#3399cc"
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
}
</script>

</body>
</html>
